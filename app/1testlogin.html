<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ABASA – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020617; /* neutral-950 */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 0.75rem;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #9ca3af;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
    }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.9rem;
      margin-bottom: 0.9rem;
    }
    input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 1px #4f46e5;
    }
    button {
      width: 100%;
      padding: 0.7rem 0.75rem;
      border-radius: 0.5rem;
      border: none;
      background: #4f46e5;
      color: white;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0.25rem;
    }
    button:hover {
      background: #4338ca;
    }
    .footer {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">ABASA</div>
    <div class="subtitle">Sign in to your account</div>

    <form>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" />

      <button type="button">Continue</button>
    </form>

    <div class="footer">
      ABASA — static login mockup
    </div>
  </div>
</body>
</html>
